name: 'aviation_analytics'
version: '1.0.0'
config-version: 2

profile: 'aviation_analytics'

vars:
  'dbt_date:time_zone': 'UTC'

clean-targets:
  - "target"
  - "dbt_packages"

models:
  aviation_analytics:
    +materialized: incremental
    +incremental_strategy: merge
    +schema: curated
    +persist_docs:
      relation: true
      columns: true
